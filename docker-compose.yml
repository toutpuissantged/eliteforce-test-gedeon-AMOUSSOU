version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: eliteforce
      POSTGRES_PASSWORD: eliteforce_password
      POSTGRES_DB: eliteforce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eliteforce -d eliteforce_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://eliteforce:eliteforce_password@db:5432/eliteforce_db?schema=public
      - JWT_SECRET=eliteforce_super_secret_jwt_key_2026
      - JWT_EXPIRES_IN=7d
      - PORT=3000
      - STRIPE_SECRET_KEY=sk_test_placeholder_key
      - STRIPE_WEBHOOK_SECRET=whsec_placeholder_key
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: